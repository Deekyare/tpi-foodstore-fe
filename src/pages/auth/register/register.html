<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Food Store - Iniciar Sesión</title>
    <link rel="stylesheet" href="../../../style.css" />
    <link rel="stylesheet" href="../auth.css" />
  </head>
  <body>
    <div class="login-container">
      <form class="login-form" id="form">
        <h1 class="login-form__titulo">Food Store</h1>
        <h2 class="login-form__subtitulo">Registro</h2>

        <label class="login-form__label" for="nombre">Nombre:</label>
        <input
          class="login-form__input"
          type="text"
          id="nombre"
          name="nombre"
          placeholder="Ingresa tu nombre"
          required
        />
        <label class="login-form__label" for="apellido">Apellido:</label>
        <input
          class="login-form__input"
          type="text"
          id="apellido"
          name="apellido"
          placeholder="Ingresa tu nombre"
          required
        />
        <label class="login-form__label" for="email">Email:</label>
        <input
          class="login-form__input"
          type="email"
          id="email"
          name="email"
          placeholder="tucorreo@ejemplo.com"
          required
        />

        <label class="login-form__label" for="password">Contraseña:</label>
        <input
          class="login-form__input"
          type="password"
          id="password"
          name="password"
          placeholder="Mínimo 8 caracteres"
          required
        />

        <button class="login-form__button" type="submit">Registrarse</button>

        <p class="login-form__footer">
          ¿Ya tenés cuenta?
          <a href="../login/login.html" class="login-form__link">Iniciar Sesión</a>
        </p>
      </form>
    </div>

    <script type="module" src="./registro.ts"></script>
  </body>
</html>
