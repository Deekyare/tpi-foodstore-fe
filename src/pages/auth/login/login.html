<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Food Store - Iniciar Sesión</title>
    <link rel="stylesheet" href="../../../style.css" />
    <link rel="stylesheet" href="./login.css" />
  </head>
  <body>
    <div class="login-container">
      <form class="login-form" id="form">
        <h1 class="login-form__titulo">Food Store</h1>
        <h2 class="login-form__subtitulo">Iniciar Sesión</h2>

        <label class="login-form__label" for="email">Email:</label>
        <input
          class="login-form__input"
          type="email"
          id="email"
          name="email"
          placeholder="tucorreo@ejemplo.com"
          required
        />

        <label class="login-form__label" for="password">Contraseña:</label>
        <input
          class="login-form__input"
          type="password"
          id="password"
          name="password"
          placeholder="Mínimo 8 caracteres"
          required
        />

        <button class="login-form__button" type="submit">INGRESAR</button>

        <p class="login-form__footer">
          ¿No tenés cuenta?
          <a href="#" class="login-form__link">Registrate acá</a>
        </p>

        <div class="login-form__pruebas">
          <p class="login-form__pruebas-titulo">Cuentas de prueba:</p>
          <p>Admin: admin@admin.com / 123456</p>
          <p>Cliente: cliente@food.com / cliente123</p>
        </div>
      </form>
    </div>

    <script type="module" src="./login.ts"></script>
  </body>
</html>
