<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Food Store - Detalle de Producto</title>
    <link rel="stylesheet" href="../../../style.css" />
    <link rel="stylesheet" href="./productDetailStyles.css" />
  </head>
  <body>
    <header class="header">
      <a href="../home/home.html" class="logo__title">
        <img
          src="/assets/food-logo.png"
          alt="Food Store logo"
          class="logo__img"
        />
        <span class="logo__nombre">Food Store</span>
      </a>

      <nav>
        <ul class="nav__list" style="align-items: center">
          <li><a href="../home/home.html" class="nav__link">Inicio</a></li>
          <li>
            <a href="../../client/orders/orders.html" class="nav__link"
              >Mis Pedidos</a
            >
          </li>
          <li>
            <a
              href="../cart/cart.html"
              class="nav__link"
              style="display: flex; align-items: center; gap: 5px"
            >
              🛒 Carrito
              <span class="cartCounter" id="cart-counter">0</span>
            </a>
          </li>
          <li>
            <span class="nav__link" style="color: var(--color-gris)"
              >Juan Pérez</span
            >
          </li>
          <li>
            <button class="btnCerrarSesion">Cerrar Sesión</button>
          </li>
        </ul>
      </nav>
    </header>

    <main class="main-producto">
      <div class="producto-grid">
        <div class="producto-imagen-caja">
          <div class="producto-imagen-tarjeta">
            <img
              id="producto-imagen"
              src=""
              alt=""
              class="producto-img-principal"
            />
          </div>
        </div>

        <div class="contenedorDetallesProdc">
          <div class="producto-info-caja">
            <span class="producto-categoria">Hamburguesas</span>
            <h1 class="producto-titulo">Hamburguesa Completa</h1>
            <div class="producto-precio">$5500.00</div>

            <div>
              <span class="producto-stock">Disponible (Stock: 30)</span>
            </div>

            <p class="producto-descripcion">
              Carne 150g, huevo, jamón, queso, lechuga y tomate
            </p>

            <div class="producto-cantidad-wrapper">
              <span class="cantidad-label">Cantidad:</span>
              <div class="quantity-selector override-qty">
                <button type="button" class="btn--restar">-</button>
                <span class=".quantity-selector quantity-selector__txt">1</span>
                <button type="button" class="btn--sumar">+</button>
              </div>
            </div>

            <div class="producto-acciones">
              <button class="btn-naranja">&#128722; Agregar al Carrito</button>
              <a href="../home/home.html" class="btn-gris">← Volver</a>
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer class="footer">
      <p>&copy; 2026 Tp Integrador - Giardini Silvia</p>
    </footer>

    <script type="module" src="./productDetail.ts"></script>
  </body>
</html>
