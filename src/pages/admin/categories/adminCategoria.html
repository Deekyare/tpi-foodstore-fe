<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Food Store - Mis Pedidos</title>
    <link rel="stylesheet" href="../../../style.css" />
    <link rel="stylesheet" href="../adminHome/adminHome.css" />
    <link rel="stylesheet" href="./adminCategoria.css" />
  </head>
  <body>
    <header class="header">
      <a href="../../store/home/home.html" class="logo__title">
        <img
          src="/assets/food-logo.png"
          alt="Food Store logo"
          class="logo__img"
        />
        <span class="logo__nombre">Food Store</span>
      </a>
      <nav class="nav">
        <ul class="nav__list">
          <li>
            <a href="../../store/home/home.html" class="nav__link">Tienda</a>
          </li>
          <li>
            <a href="../adminHome/adminHome.html" class="nav__link"
              >Panel Admin</a
            >
          </li>
          <li><a href="#" class="nav__link">Admin Sistema</a></li>
          <li>
            <button class="btnCerrarSesion">Cerrar Sesión</button>
          </li>
        </ul>
      </nav>
    </header>

    <main class="main-container">
      <aside class="sidebar-admin">
        <div class="sidebar-admin__seccion">
          <h2 class="sidebar-admin__title">Administración</h2>
          <span class="sidebar-admin__subtit">Panel de control</span>
        </div>

        <ul class="sidebar-admin__list">
          <li>
            <a
              href="../adminHome/adminHome.html"
              class="sidebar-admin__link "
              >📊 Dashboard</a
            >
          </li>
          <li>
            <a
              href="../categories/adminCategoria.html"
              class="sidebar-admin__link"
              >📁 Categorías</a
            >
          </li>
          <li>
            <a href="../products/products.html" class="sidebar-admin__link"
              >🍔 Productos</a
            >
          </li>
          <li>
            <a href="../orders/orders.html" class="sidebar-admin__link"
              >📦 Pedidos</a
            >
          </li>
        </ul>

        <div class="sidebar-admin__linea"></div>

        <ul class="sidebar-admin__list">
          <li>
            <a href="../../store/home/home.html" class="sidebar-admin__link"
              >🏪 Ver Tienda</a
            >
          </li>
        </ul>
      </aside>
      <!-- Seccion derecha -->
      <section class="seccion-derecha" id="seccion-derecha">
        <h1 class="seccion-derecha__titulo">Gestión de categorías</h1>

        <!-- Contenedor de la tabla -->
        <div class="tabla-contenedor">
          <table class="tabla-admin">
            <thead class="tabla-encabezado">
              <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Descripción</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="contenedor-lista-categorias">
              <!-- Las filas se inyectarán acá dinámicamente -->
            </tbody>
          </table>
        </div>
      </section>
    </main>

    <footer class="footer">
      <p>&copy; 2026 TPI - Giardini Silvia</p>
    </footer>
    <script type="module" src="./adminCategoria.ts"></script>
  </body>
</html>
